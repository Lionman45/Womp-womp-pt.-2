<html>
    <head>
        <title>Your sets | Quizlet</title>
    </head>
    <body>
        <style>
            div {
                width: 100%;
                height: 100%;
                align-items: center;
                justify-content: center;
            }

            #header {
                font-size: 2em;
                font-weight: bold
            }

            #mainDiv {
                display: flex;
            }

            body {
                font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            }

            a, button {
                background: linear-gradient(135deg, #667eea, #764ba2);
                border: 0;
                border-radius: 15px;
                box-shadow: 0 10px 10px -10px #764ba2;
                color: white;
                cursor: pointer;
                font-family: 'Roboto', sans-serif;
                font-size: 1rem;
                font-weight: 300;
                text-decoration: none;
                text-shadow: 0 1px 0 #528ecc;
                padding: 5px;
                width: 50%;
                height: 15vh;
            }
        </style>
        <div id="mainDiv">
            <h1>Welcome to suntree</h1>
            <br>
            <button onclick="alarm()">Go</button>
        </div>

        <div style="display: none;" id="goodDiv">
            <img src="skeletonTakesTheL.gif">
            <br>
            <img src="jug-smug-smug.gif">
            <br>
            <h1>Loser 😜🤪</h1>
            <br>
            Sound Effect by <a href="https://pixabay.com/users/the_cutie_pie-38941251/?utm_source=link-attribution&utm_medium=referral&utm_campaign=music&utm_content=165805" download="jug-smug-smug.gif">Adam Costa</a> from <a href="https://pixabay.com//?utm_source=link-attribution&utm_medium=referral&utm_campaign=music&utm_content=165805" download="jug-smug-smug.gif">Pixabay</a>
        </div>
        <script>
            function alarm() {
                document.getElementById("goodDiv").style.display = "flex";
                document.getElementById("mainDiv").style.display = "none";

                var audio = new Audio('soLoud.mp3');
                audio.loop = true;
                audio.volume = 1;
                audio.play();
                audio.play();
                audio.play();
            }
        </script>
    </body>
</html>
